apiVersion: apps/v1
kind: Deployment

metadata:
  name: novapay-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: novapay

  template:
    metadata:
      labels:
        app: novapay

    spec:
      containers:
        - name: novapay
          image: novapay:v1
          ports:
            - containerPort: 8080