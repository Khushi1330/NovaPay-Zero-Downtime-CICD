apiVersion: apps/v1
kind: Deployment

metadata:
  name: novapay-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: novapay

  template:
    metadata:
      labels:
        app: novapay

    spec:
      containers:
      - name: novapay
        image: novapay:v1

        ports:
        - containerPort: 8080

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"

          limits:
            memory: "512Mi"
            cpu: "500m"